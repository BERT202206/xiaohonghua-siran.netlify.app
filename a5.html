<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>小红花奖励册</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--bg:#F3EDE4;--fg:#2C1810;--muted:#9C8B7E;--accent:#FF1A0A;--slot-border:#FF8080;--slot-bg:#FFF9F9;--warm:#FF8C00;--sidebar-bg:#221510;--sidebar-text:#E8D8C8}
        *{margin:0;padding:0;box-sizing:border-box}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}body{font-family:"Noto Sans SC",sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
        .app{display:flex;min-height:100vh}
        .sidebar{width:300px;min-width:300px;background:var(--sidebar-bg);color:var(--sidebar-text);padding:30px 20px;display:flex;flex-direction:column}
        .sidebar-brand{text-align:center;margin-bottom:10px}
        .sidebar-brand-icon{font-size:28px;color:var(--warm);margin-bottom:8px;animation:spin 3s linear infinite}
        .sidebar-title{font-family:"ZCOOL KuaiLe",cursive;font-size:22px;color:var(--warm)}
        .version-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;padding:2px 10px;border-radius:10px;margin-top:6px}
        .sidebar-desc{font-size:11px;color:rgba(232,216,200,0.5);text-align:center;margin:15px 0 20px}
        .month-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;flex:1}
        .section-tabs{display:flex;gap:3px;margin-top:6px}
        .section-tab{flex:1;padding:5px 0;border:1px solid rgba(232,216,200,0.2);border-radius:4px;background:transparent;color:var(--sidebar-text);font-size:10px;cursor:pointer}
        .section-tab.active{background:var(--accent);border-color:var(--accent)}
        .print-section{margin-top:20px;display:flex;flex-direction:column;gap:10px}
        .print-btn{padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .print-btn-primary{background:var(--accent);color:#fff}
        .print-btn-outline{background:rgba(232,216,200,0.08);color:var(--sidebar-text);border:1.5px solid rgba(232,216,200,0.2)}
        .main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px;background:var(--bg)}
        .a5-paper{width:148mm;height:210mm;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.1);border-radius:3px;overflow:hidden}
        .month-content{width:100%;height:100%;padding:8mm;display:flex;flex-direction:column}
        .page-header{text-align:center;padding-bottom:4mm;margin-bottom:4mm;border-bottom:1px solid var(--accent)}
        .page-title{font-family:"ZCOOL KuaiLe",cursive;font-size:13pt;color:var(--accent);letter-spacing:4px;margin-bottom:3mm}
        .page-header-row{display:flex;align-items:center;justify-content:center;gap:8mm}
        .page-month{font-family:"ZCOOL KuaiLe",cursive;font-size:20pt;color:var(--accent)}
        .page-section{font-family:"ZCOOL KuaiLe",cursive;font-size:20pt;color:var(--warm)}
        .name-box{display:flex;align-items:center;gap:2mm}
        .name-label{font-family:"ZCOOL KuaiLe",cursive;font-size:20pt;color:var(--warm)}
        .name-line{width:25mm;border-bottom:1px solid var(--fg);transform:translateY(12px);display:inline-block}
        .days-area{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4mm}
        .day-row{display:flex;align-items:center;height:12mm;gap:3mm}
        .day-num{width:10mm;font-size:13pt;font-weight:600;text-align:right;padding-right:2mm}
        .day-num.weekend{color:var(--accent)}
        .day-slots{flex:1;display:flex;justify-content:center;gap:2mm}
        .slot{width:10mm;height:10mm;border-radius:50%;border:1.5pt solid var(--slot-border);background:var(--slot-bg);position:relative}.slot::after{content:'\2605';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4mm;color:rgba(255,26,10,0.1)}
        .page-footer{margin-top:auto;padding-top:4mm;border-top:0.5px solid #ddd;display:flex;justify-content:space-between;font-size:10pt;color:var(--muted)}
        .print-area{display:none}
        @media print{@page{size:A5 portrait;margin:0}html,body{width:148mm;height:210mm;margin:0;padding:0;background:#fff;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.app{display:none!important}.print-area{display:block!important}}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-brand"><i class="fas fa-fan sidebar-brand-icon"></i><div class="sidebar-title">小红花奖励册</div><div class="version-badge">A5打印版</div></div>
            <div class="sidebar-desc">选择月份和时间段<br>10mm大格子·每行10格</div>
            <div id="monthGrid" class="month-grid"></div>
            <div class="print-section">
                <button class="print-btn print-btn-primary" onclick="printCurrent()"><i class="fas fa-print"></i>打印当前</button>
                <button class="print-btn print-btn-outline" onclick="printAll()"><i class="fas fa-layer-group"></i>打印全年(36页)</button>
            </div>
        </aside>
        <main class="main"><div id="a5Paper" class="a5-paper"></div></main>
    </div>
    <div id="printArea" class="print-area"></div>
    <script>
        const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
        let curMonth=new Date().getMonth(),curSection=0;
        const SECTIONS=[{name:"1-10日",start:1,end:10},{name:"11-20日",start:11,end:20},{name:"21-月底",start:21,end:null}];
        function getDays(m){return new Date(2025,m+1,0).getDate()}
        function isWeekend(m,d){const day=new Date(2025,m,d).getDay();return day===0||day===6}
        function buildHTML(m,secIdx,isPrint){
            const sec=SECTIONS[secIdx],endDay=sec.end||getDays(m);
            let rows="";
            for(let d=sec.start;d<=endDay;d++){
                let slots="";
                for(let s=0;s<10;s++)slots+="<div class='slot'></div>";
                rows+=`<div class='day-row'><div class='day-num${isWeekend(m,d)?" weekend":""}'>${String(d).padStart(2,"0")}</div><div class='day-slots'>${slots}</div></div>`;
            }
            return `<div class='${isPrint?"print-page":""}' style='${isPrint?"width:148mm;height:210mm;":""}'><div class='month-content'><header class='page-header'><div class='page-title'>✿每日奖励<span style='color:var(--accent)'>小红花</span>✿</div><div class='page-header-row'><div class='page-month'>${MONTHS[m]}</div><div class='page-section'>${sec.name}</div><div class='name-box'><span class='name-label'>姓名</span><span class='name-line'></span></div></div></header><div class='days-area'>${rows}</div><footer class='page-footer'><span>本页总计:_____朵小红花</span><span style='color:var(--accent)'>✿</span></footer></div></div>`;
        }
        function renderGrid(){
            let html="";
            MONTHS.forEach((name,i)=>{
                html+=`<div style='text-align:center'><div style='font-size:11px;margin-bottom:4px'>${name}</div><div class='section-tabs'>`;
                SECTIONS.forEach((sec,j)=>{
                    const active=(i===curMonth&&j===curSection)?" active":"";
                    html+=`<button class='section-tab${active}' onclick='switchSection(${i},${j})'>${sec.name}</button>`;
                });
                html+="</div></div>";
            });
            document.getElementById("monthGrid").innerHTML=html;
        }
        function switchSection(m,s){curMonth=m;curSection=s;renderGrid();document.getElementById("a5Paper").innerHTML=buildHTML(m,s,false)}
        function printCurrent(){document.getElementById("printArea").innerHTML=buildHTML(curMonth,curSection,true);setTimeout(()=>window.print(),100)}
        function printAll(){let html="";for(let m=0;m<12;m++)for(let s=0;s<3;s++)html+=buildHTML(m,s,true);document.getElementById("printArea").innerHTML=html;setTimeout(()=>window.print(),200)}
        renderGrid();switchSection(curMonth,0);
    </script>
</body>
</html>
