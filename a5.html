<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日奖励小红花 (A5双页版)</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #F3EDE4;
            --fg: #2C1810;
            --muted: #9C8B7E;
            --accent: #D94F3B;
            --accent-dark: #B83D2D;
            --sidebar-bg: #221510;
            --sidebar-text: #E8D8C8;
            --slot-border: #E0A8A8;
            --slot-bg: #FFF2F0;
            --warm: #E8A860;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
        }

        .app { display: flex; min-height: 100vh; }

        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            text-align: center;
            margin-bottom: 4px;
        }

        .sidebar-brand-icon {
            font-size: 24px;
            color: var(--warm);
            margin-bottom: 6px;
            display: block;
        }

        .sidebar-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 18px;
            color: var(--warm);
        }

        .sidebar-desc {
            font-size: 11px;
            color: rgba(232,216,200,0.4);
            text-align: center;
            margin: 8px 0 16px;
            line-height: 1.5;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            flex: 1;
        }

        .month-btn {
            padding: 8px 2px;
            border: 1px solid rgba(232,216,200,0.1);
            border-radius: 8px;
            background: transparent;
            color: var(--sidebar-text);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .month-btn .m-icon { font-size: 12px; opacity: 0.4; }
        .month-btn:hover { background: rgba(232,93,74,0.15); border-color: var(--accent); }
        .month-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 2px 8px rgba(217,79,59,0.4); }
        .month-btn.active .m-icon { opacity: 1; }

        .print-section { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

        .print-btn {
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .print-btn-primary { background: var(--accent); color: #fff; }
        .print-btn-primary:hover { background: var(--accent-dark); }
        .print-btn-outline { background: rgba(232,216,200,0.08); color: var(--sidebar-text); border: 1px solid rgba(232,216,200,0.2); }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 15px;
            overflow-y: auto;
        }

        /* A5 纸张预览 */
        .a5-paper {
            width: 148mm;
            height: 210mm;
            background: #fff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-shrink: 0;
        }

        .a5-content {
            width: 100%;
            height: 100%;
            padding: 8mm 10mm;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            text-align: center;
            padding-bottom: 4mm;
            border-bottom: 1px solid var(--accent);
            margin-bottom: 4mm;
        }

        .page-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 18pt;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .page-subtitle {
            font-size: 9pt;
            color: var(--muted);
            margin-top: 1mm;
        }

        /* 日期表格布局 */
        .days-table {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 2.5mm;
        }

        .day-row {
            display: table-row;
        }

        .day-cell {
            display: table-cell;
            vertical-align: middle;
        }

        .day-num {
            width: 10mm;
            font-size: 12pt;
            font-weight: 700;
            text-align: center;
            color: var(--fg);
        }

        .day-num.weekend {
            color: var(--accent);
        }

        /* 贴纸容器 - 固定间距 */
        .slots-container {
            display: flex;
            gap: 2mm;
            padding-left: 3mm;
        }

        /* 完美的圆形格子 */
        .slot {
            width: 7mm;
            height: 7mm;
            border-radius: 50%;
            border: 1pt solid var(--slot-border);
            background: var(--slot-bg);
            flex-shrink: 0;
            position: relative;
        }

        .slot::after {
            content: '★';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3mm;
            color: rgba(217,79,59,0.1);
        }

        .page-footer {
            margin-top: auto;
            padding-top: 4mm;
            border-top: 0.5px solid #ddd;
            display: flex;
            justify-content: space-between;
            font-size: 8pt;
            color: var(--muted);
        }

        .footer-brand {
            font-family: 'ZCOOL KuaiLe', cursive;
            color: var(--accent);
            opacity: 0.4;
        }

        .print-area { display: none; }

        /* A5 打印样式 */
        @media print {
            @page {
                size: A5 portrait;
                margin: 0;
            }

            html, body {
                width: 148mm;
                margin: 0;
                padding: 0;
                background: #fff;
            }

            .app, .float-hint { display: none !important; }

            .print-area {
                display: block !important;
            }

            .print-page {
                width: 148mm;
                height: 210mm;
                page-break-after: always;
                overflow: hidden;
            }

            .print-page:last-child {
                page-break-after: auto;
            }
        }

        @media (max-width: 900px) {
            .sidebar { width: 200px; min-width: 200px; padding: 16px 12px; }
            .month-grid { grid-template-columns: repeat(2, 1fr); }
            .main { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-icon"><i class="fas fa-fan"></i></span>
                <div class="sidebar-title">小红花奖励册</div>
            </div>
            <div class="sidebar-desc">A5双页版 · 每行13格<br>上半月 + 下半月<br>格子不变形 · 充分利用</div>
            <div class="month-grid" id="monthGrid"></div>
            <div class="print-section">
                <button class="print-btn print-btn-primary" onclick="printMonth()">
                    <i class="fas fa-print"></i> 打印本月（2页）
                </button>
            </div>
        </aside>

        <main class="main" id="main">
            <!-- 上半月预览 -->
            <div class="a5-paper" id="page1"></div>
            <!-- 下半月预览 -->
            <div class="a5-paper" id="page2"></div>
        </main>
    </div>

    <div class="print-area" id="printArea"></div>

    <script>
        const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
        const MONTH_ICONS = ['fa-snowflake','fa-heart','fa-seedling','fa-leaf','fa-sun','fa-umbrella-beach','fa-ice-cream','fa-fire','fa-cloud-sun','fa-mountain','fa-moon','fa-gift'];

        let currentMonth = new Date().getMonth();
        const SLOTS_PER_ROW = 13; // 每行13个完美圆形格子，充分利用A5宽度

        function getDaysInMonth(m) {
            return new Date(2025, m + 1, 0).getDate();
        }

        function isWeekend(m, day) {
            const d = new Date(2025, m, day);
            return d.getDay() === 0 || d.getDay() === 6;
        }

        // 生成单页HTML
        function buildPageHTML(m, startDay, endDay, pageLabel, isPrint) {
            let rows = '';

            for (let d = startDay; d <= endDay; d++) {
                const weClass = isWeekend(m, d) ? ' weekend' : '';
                let slots = '';
                for (let s = 0; s < SLOTS_PER_ROW; s++) {
                    slots += '<div class="slot"></div>';
                }

                rows += `
                    <div class="day-row">
                        <div class="day-num${weClass}">${d}</div>
                        <div class="day-cell">
                            <div class="slots-container">${slots}</div>
                        </div>
                    </div>`;
            }

            const wrapperClass = isPrint ? 'print-page' : 'a5-paper';
            const inlineStyle = isPrint ? 'style="width:148mm;height:210mm;"' : '';

            return `
                <div class="${wrapperClass}" ${inlineStyle}>
                    <div class="a5-content">
                        <header class="page-header">
                            <div class="page-title">${MONTH_NAMES[m]} ${pageLabel}</div>
                            <div class="page-subtitle">每日奖励小红花 · 坚持就是胜利</div>
                        </header>
                        <div class="days-table">${rows}</div>
                        <footer class="page-footer">
                            <span>姓名：__________</span>
                            <span class="footer-brand">✿ 小红花奖励册 ✿</span>
                        </footer>
                    </div>
                </div>`;
        }

        // 生成分页内容
        function buildMonthPages(m, isPrint) {
            const days = getDaysInMonth(m);
            const mid = Math.ceil(days / 2);

            const page1 = buildPageHTML(m, 1, mid, '（上）', isPrint);
            const page2 = buildPageHTML(m, mid + 1, days, '（下）', isPrint);

            return { page1, page2 };
        }

        function renderGrid() {
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = MONTH_NAMES.map((name, i) => {
                const active = i === currentMonth ? ' active' : '';
                return `
                    <button class="month-btn${active}" onclick="switchMonth(${i})">
                        <span class="m-icon"><i class="fas ${MONTH_ICONS[i]}"></i></span>
                        <span>${name}</span>
                    </button>`;
            }).join('');
        }

        function switchMonth(i) {
            currentMonth = i;
            renderGrid();

            const { page1, page2 } = buildMonthPages(i, false);
            document.getElementById('page1').outerHTML = page1;
            document.getElementById('page2').outerHTML = page2;
        }

        function printMonth() {
            const { page1, page2 } = buildMonthPages(currentMonth, true);
            document.getElementById('printArea').innerHTML = page1 + page2;
            setTimeout(() => window.print(), 100);
        }

        // 初始化
        renderGrid();
        switchMonth(currentMonth);
    </script>
</body>
</html>
